arch = { packages = [

  # -------------- CORE PACKAGES ---------------
  # Core package
  { name = "base", hooks = { after_install = [
    "sh", "-c", "$HOME/.config/metapac/scripts/base_install.sh"
  ] } },
  "base-devel",
  "linux",
  "linux-firmware",
  "linux-headers",
  "amd-ucode",
  { name = "grub", hooks = { after_install = [
    "sh", "-c", "$HOME/.config/metapac/scripts/grub/grub_install.sh"
  ] } },
  "efibootmgr",
  "sudo",
  "mandoc",
  { name = "openssh", hooks = { after_install = [
    "sudo", "systemctl", "enable", "sshd"
  ] } },

  # Package manager
  "metapac", "paru", "downgrade",
  { name = "flatpak", hooks = { after_install = [
    "sh", "-c", "$HOME/.config/metapac/scripts/flatpak_install.sh"
  ] } },
  # ---------------------------------------------


  # ------------- SYSTEM PACKAGES ---------------
  # Pipewire audio
  { name = "pipewire", hooks = { after_install = [
    "sh", "-c", "$HOME/.config/metapac/scripts/pipewire_install.sh"
  ] } },
  "pipewire-pulse", "pipewire-jack", "pipewire-alsa",

  # Graphic drivers
  "mesa", "vulkan-radeon",

  # Power manager
  "ryzenadj", "tuned-ppd",
  { name = "tuned", hooks = { after_install = [
    "sh", "-c", "$HOME/.config/metapac/scripts/tuned/tuned_install.sh"
  ] } },

  # Network manager
  { name = "bluez", hooks = { after_install = [
    "sudo", "systemctl", "enable", "--now", "bluetooth"
  ] } },
  { name = "networkmanager", hooks = { after_install = [
    "sh", "-c", "$HOME/.config/metapac/scripts/networkmanager_install.sh"
  ] } },
  "wireless-regdb",
  { name = "firewalld", hooks = { after_install = [
    "sh", "-c", "$HOME/.config/metapac/scripts/firewalld_install.sh"
  ] } },
  { name = "avahi", hooks = { after_install = [
    "sh", "-c", "$HOME/.config/metapac/scripts/avahi_install.sh"
  ] } },
  "nss-mdns",

  # Printer
  { name = "cups", hooks = { after_install = [
    "sudo", "systemctl", "enable", "--now", "cups"
  ] } },
  "cups-browsed",

  # Inputs
  "steam-devices",
  { name = "keyd", hooks = { after_install = [
    "sh", "-c", "$HOME/.config/metapac/scripts/keyd/keyd_install.sh"
  ] } },

  # Gstreamer
  "gstreamer",
  "gst-plugin-va", "gst-plugin-pipewire",
  "gst-plugins-ugly","gst-plugins-bad","gst-plugins-good",

  # ETC
  "ntfs-3g",        # ntfs mount
  "dosfstools",     # fat support
  "fprintd",        # fingerprint module
  "fwupd",          # firmware updater
  "smartmontools",  # Storage smart value util
  "arch-install-scripts",
  # ---------------------------------------------


  # ----------- DESKTOP ENVIONMENT --------------
  # Desktop environment
  { name = "plasma-meta", hooks = { after_install = [
    "sudo", "systemctl", "enable", "--now", "plasmalogin",
  ] } },
  "qt6-multimedia-ffmpeg",
  "noto-fonts",
  "colord-kde",
  "packagekit-qt6",
  "system-config-printer",
  "plymouth-kcm", "breeze-plymouth", # Plymouth
  "kaccounts-providers", # Online Account
  "kdeconnect", "kdenetwork-filesharing", # KDE connect
  "plasma-sdk", # Devtools

  # KIO support
  "kio", "kio-extras",
  "kio-s3",
  "kio-stash",
  "kio-zeroconf",
  "kio-admin",
  "kio-gdrive",

  # Thumbnailer
  "ffmpegthumbs",             # Videos: .mp4 .webm ...
  "kdegraphics-thumbnailers", # Docs:  .pdf .raw ...
  "glycin",                   # Images: .jpeg .avif .svg
  "libappimage",              # .AppImage

  # OCR support
  # Due to loading speed issue, currently disable this
  # "tesseract",
  # "tesseract-data-jpn",
  # "tesseract-data-kor",
  # "tesseract-data-eng",

  # Fonts
  "noto-fonts-cjk",
  "noto-fonts-emoji",

  # IME
  "fcitx5", "fcitx5-configtool",
  "fcitx5-gtk", "fcitx5-hangul",
  "fcitx5-qt",

  # Plugins
  "kwin-effects-better-blur-dx",
  # "kwin-scripts-kzones",
  "plasma6-applets-panel-colorizer",
  "plasma6-applets-wallpaper-effects",
  "plasma6-applets-thermal-monitor",
  # ---------------------------------------------


  # ------------------ APPS ---------------------
  # CLI
  "fzf", "gdu", "git", "less", "unzip", "jq", "cloc", "7zip", "bat",
  "vim", "zip", "zsh", "btop", "amdgpu_top", "nmap",
  { name = "tailscale", hooks = { after_install = [
    "sudo", "systemctl", "enable", "--now", "tailscaled"
  ] } },
  "bind", # DNS utility, such as dig

  # Apps
  "scrcpy",
  "ridibooks",
  { name  = "discord", hooks = { after_install = [
    "sh", "-c", "$HOME/.config/metapac/scripts/discord_install.sh"
  ] } }, "vencord-installer-cli-bin",

  # Editor & Viewer & Common app
  "xournalpp", # Note taking
  "dolphin", "dolphin-plugins", # File browser
  "konsole", # Terminal emulator
  "ksystemlog", # System log viewer
  "dragon", # multimedia player
  "kate", # KWrite/Kate text editor
  "gwenview", # Image viewer
  "kgpg", # Gpg key manager
  "elisa", # Music player
  "kruler", # Screen ruler
  "okular", # Epub, pdf viewer
  "kalk", # Calculator (or kcalc)
  "kwalletmanager", # Cert wallet manager
  "qrca", # QR scanner
  "kweather", # Weather
  "ark", # Archiving Tool
  "filelight", # Disk usage (or kdf)
  "kclock", # Clock
  "kfind", # File finder
  "merkuro", # Calendar
  "kcharselect", # Character selector
  "partitionmanager", # Partition manager
  "plasma-camera", # Camera app
  "kmail", # Email client
  # "keysmith", # 2fa key generator # gnome's one is better
  # "systemdgenie", # Systemd unit management !!requires qt5

  # JAVA
  "gradle",
  "jdk11-openjdk",
  "jdk21-openjdk",
  "jdk8-openjdk",

  # Development
  "visual-studio-code-bin",
  "jetbrains-toolbox",
  "android-studio",

  # Docker
  "docker",
  "docker-compose",
  "docker-buildx",

  # Virtualization
  "virtualbox-ext-oracle",
  "virtualbox-bin",
  # ---------------------------------------------
] }


[flatpak]
repos = [
  { name = "system:flathub", options = { url = "https://dl.flathub.org/repo/" } },
]
packages = [
  # Browser
  { name = "system:org.mozilla.firefox", options = { remote = "flathub" } },
  {
    name = "system:com.google.Chrome",
    options = { remote = "flathub" },
    hooks = { after_install = [ "sh", "-c", "$HOME/.config/metapac/scripts/chrome_install.sh" ] }
  },

  # Editor
  { name = "system:org.gimp.GIMP", options = { remote = "flathub" } },
  { name = "system:org.libreoffice.LibreOffice", options = { remote = "flathub" } },
  { name = "system:org.inkscape.Inkscape", options = { remote = "flathub" } },

  # Gaming
  {
    # Steam
    # Note: To fix .desktop file creation, you should run this first https://github.com/flathub/com.valvesoftware.Steam/issues/85#issuecomment-650597824
    # Unpack and override 'SteamUbuntuNonlicenseCopy.tar.zst' is required
    # To some games works fine, get it on https://cloud.qwreey.moe/index.php/s/dYfdJgd9N4HDqgc
    name = "system:com.valvesoftware.Steam",
    options = { remote = "flathub" },
    hooks = { after_install = [ "sh", "-c", "$HOME/.config/metapac/scripts/steam_install.sh" ] }
  },
  { name = "system:net.davidotek.pupgui2", options = { remote = "flathub" } }, # ProtonUp-Qt
  { name = "system:org.vinegarhq.Vinegar", options = { remote = "flathub" } }, # Roblox Studio
  { name = "system:org.vinegarhq.Sober", options = { remote = "flathub" } }, # Roblox
  { name = "system:org.prismlauncher.PrismLauncher", options = { remote = "flathub" } }, # Minecraft launcher

  # Remote
  { name = "system:com.moonlight_stream.Moonlight", options = { remote = "flathub" } },
  { name = "system:org.remmina.Remmina", options = { remote = "flathub" } }, # RDP/VNC client

  # Live broadcast
  { name = "system:com.obsproject.Studio", options = { remote = "flathub" } },
  { name = "system:com.inochi2d.inochi-session", options = { remote = "flathub" } },
  { name = "system:com.inochi2d.inochi-creator", options = { remote = "flathub" } },

  # Flatpak management
  { name = "system:com.github.tchx84.Flatseal", options = { remote = "flathub" } },
  { name = "system:io.github.flattool.Warehouse", options = { remote = "flathub" } },

  # Kde apps
  { name = "system:org.kde.okteta", options = { remote = "flathub" } }, # Hex editor
  { name = "system:org.kde.neochat", options = { remote = "flathub" } }, # Matrix client
  { name = "system:org.kde.krita", options = { remote = "flathub" } },
  { name = "system:org.kde.kdenlive", options = { remote = "flathub" } },

  { name = "system:ca.desrt.dconf-editor", options = { remote = "flathub" } },
  { name = "system:org.gnome.Geary", options = { remote = "flathub" } },
  { name = "system:com.usebottles.bottles", options = { remote = "flathub" } }, # Wine app manager
  { name = "system:io.github.pwr_solaar.solaar", options = { remote = "flathub" } }, # Logitech device manager
  { name = "system:com.mardojai.ForgeSparks", options = { remote = "flathub" } },
  { name = "system:org.fkoehler.KTailctl", options = { remote = "flathub" } }, # Tailscale gui
  { name = "system:com.github.wwmm.easyeffects", options = { remote = "flathub" } }, # Easyeffects
  { name = "system:it.mijorus.gearlever", options = { remote = "flathub" } },
  { name = "system:org.freedesktop.Bustle", options = { remote = "flathub" } },
  { name = "system:com.belmoussaoui.Authenticator", options = { remote = "flathub" } },
]
